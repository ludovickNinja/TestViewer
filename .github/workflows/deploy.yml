name: Deploy to GitHub Pages

# -----------------------------------------------------------------------
# After merging this to main, go to:
#   Settings → Pages → Source
# and set it to:
#   "Deploy from a branch" → branch: gh-pages → / (root)
#
# Every push to main will build the Vite project and push the output to
# the gh-pages branch, which GitHub Pages then serves automatically.
# -----------------------------------------------------------------------

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # needed to push the gh-pages branch

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compute base path
        id: base
        run: |
          # For project sites: https://<user>.github.io/<repo>/ → base = /<repo>/
          # For user/organization sites (repo named <user>.github.io) → base = /
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          if [[ "$REPO_NAME" == *.github.io ]]; then
            echo "value=/" >> "$GITHUB_OUTPUT"
          else
            echo "value=/$REPO_NAME/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        env:
          VITE_BASE: ${{ steps.base.outputs.value }}
        run: npm run build

      - name: Deploy to gh-pages branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd dist
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy from ${{ github.sha }}"
          git push --force \
            "https://github-actions:${GH_TOKEN}@github.com/${{ github.repository }}.git" \
            gh-pages
